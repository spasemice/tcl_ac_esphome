name: ESPHome validation

on:
  push:
    branches:
      - master
    paths:
      - "tcl-ac.yml"
      - "components/**"
      - ".github/workflows/esphome-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ESPHome
        run: pip install "esphome==2026.7.1"

      - name: Create test secrets
        run: |
          cat > secrets.yaml <<'EOF'
          wifi_ssid: "test-network"
          wifi_password: "test-password"
          ota: "test-ota-password"
          api_encryption_key: "JZmDQBon35fPVOESCnkBZBxtAQWCZTF0sey0fJpi9Ao="
          EOF

      - name: Validate configuration
        run: esphome config tcl-ac.yml

      - name: Compile firmware
        run: esphome compile tcl-ac.yml
